

<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO Dashboard - Bi-Directional</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root {
            --bg-dark: #0d0612; 
            --card-bg: #1a0f26;
            --neon-purple: #b050ff;
            --neon-pink: #ff00ff; 
            --text-gray: #8e6b9c;
            --text-light: #d0a0ff;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--text-light); 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        h1 { letter-spacing: 5px; text-shadow: 0 0 10px var(--neon-purple); margin-bottom: 20px; }

        .dashboard {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 25px;
            border: 1px solid var(--neon-purple);
            box-shadow: 0 0 20px rgba(176, 80, 255, 0.2);
            text-align: center;
            width: 350px;
        }

        .label { font-size: 0.75em; color: var(--text-gray); text-transform: uppercase; margin-bottom: 10px; }
        .value { font-size: 3.5em; font-weight: 900; color: var(--neon-purple); margin-bottom: 20px; }

        /* Butonul Interactiv pentru Trimitere Date */
        .btn-ham {
            background: transparent;
            border: 2px solid var(--neon-pink);
            color: var(--neon-pink);
            padding: 15px 30px;
            font-size: 1.1em;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.2);
            margin-top: 20px;
        }

        .btn-ham:hover {
            background: var(--neon-pink);
            color: white;
            box-shadow: 0 0 20px var(--neon-pink);
        }

        .btn-ham:active { transform: scale(0.95); }
