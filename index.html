<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO Dashboard v2.1</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #0d0612; --purp: #b050ff; --pink: #ff00ff; --txt: #d0a0ff; }
        body { font-family: sans-serif; background: var(--bg); color: var(--txt); display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .dashboard { background: #1a0f26; padding: 40px; border-radius: 25px; border: 2px solid var(--purp); text-align: center; width: 320px; box-shadow: 0 0 20px rgba(176,80,255,0.3); }
        .value { font-size: 4em; font-weight: bold; color: var(--purp); margin: 10px 0; }
        .status-btn { font-size: 1.5em; font-weight: bold; margin-top: 20px; padding: 10px; border-top: 1px solid #331a4d; }
        .active { color: var(--pink); text-shadow: 0 0 10px var(--pink); animation: blink 0.8s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <h1>ECHO DASHBOARD</h1>
    <div class="dashboard">
        <div style="font-size: 0.8em; color: #8e6b9c;">DISTANȚĂ LIVE</div>
        <div id="dist-val" class="value">-- cm</div>
        <div id="dist-msg" style="margin-bottom: 20px;">SENZOR ACTIV</div>

        <div class="status-btn">
            <div style="font-size: 0.5em; color: #8e6b9c;">BUTON BREADBOARD</div>
            <div id="btn-status">INACTIV</div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://echo-bd4aa-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. AFISARE DISTANTA
        db.ref('sistem/distanta').on('value', (s) => {
            const d = s.val();
            const el = document.getElementById('dist-val');
            if (d === null || d === 999) {
                el.innerText = "-- cm";
            } else {
                el.innerText = d + " cm";
                el.style.color = d < 15 ? "#ff00ff" : "#b050ff";
            }
        });

        // 2. STATUS BUTON (MODIFICAT DURATA LA 5 SECUNDE)
        let lastVal = null;
        db.ref('trigger_buton').on('value', (s) => {
            const val = s.val();
            const el = document.getElementById('btn-status');
            
            // Daca valoarea s-a schimbat in baza de date
            if (lastVal !== null && val !== lastVal) {
                el.innerText = "APĂSAT!";
                el.className = "active";
                
                // --- AICI ESTE MODIFICAREA: 5000ms = 5 secunde ---
                setTimeout(() => {
                    el.innerText = "INACTIV";
                    el.className = "";
                }, 5000); 
            }
            lastVal = val;
        });
    </script>
</body>
</html>
