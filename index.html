<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>ECHO RT - Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root {
            --bg: #020617; --card: #0f172a; --cyan: #00f2ff;
            --green: #22c55e; --orange: #f59e0b; --red: #ef4444;
            --text: #f8fafc; --border: #1e293b;
        }
        body { 
            background-color: var(--bg); color: var(--text); 
            font-family: 'Segoe UI', sans-serif; display: flex; 
            flex-direction: column; align-items: center; padding: 40px 20px; margin: 0; 
        }
        .dashboard { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 20px; width: 100%; max-width: 1000px; 
        }
        .card { 
            background: var(--card); border: 1px solid var(--border); 
            padding: 35px; border-radius: 24px; text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }
        .label { color: #94a3b8; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; display: block; }
        .value { font-size: 3.5rem; font-weight: 900; display: block; }
        
        /* Status Colors */
        .st-siguranta { color: var(--green); }
        .st-obstacol { color: var(--orange); }
        .st-pericol { color: var(--red); animation: pulse 1s infinite; }
        .st-time { color: var(--cyan); font-family: 'Courier New', monospace; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    </style>
</head>
<body>

    <h1 style="color: var(--cyan); letter-spacing: 5px; margin-bottom: 50px;">ECHO <span style="color:white">COMMAND CENTER</span></h1>

    <div class="dashboard">
        <div class="card">
            <span class="label">Radar Distanță</span>
            <span id="dist-val" class="value">-- cm</span>
        </div>

        <div class="card">
            <span class="label">Stare Sistem</span>
            <span id="status-val" class="value" style="font-size: 2.5rem;">INIT...</span>
        </div>

        <div class="card">
            <span class="label">Ultima Activare Buton</span>
            <span id="time-val" class="value st-time">--:--</span>
            <span style="font-size: 0.7rem; color: #475569; margin-top: 10px; display: block;">MISSION TIME (MM:SS)</span>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://echo-bd4aa-default-rtdb.europe-west1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. MONITORIZARE DISTANTA SI STATUS
        db.ref('sistem').on('value', (snapshot) => {
            const data = snapshot.val();
            if(!data) return;

            const dist = data.distanta;
            const dv = document.getElementById('dist-val');
            const sv = document.getElementById('status-val');
            
            dv.innerText = dist + " cm";

            // LOGICA TA: Pericol < 10 | Obstacol 10-100 | Siguranta > 100
            if (dist <= 10 && dist > 0) {
                sv.innerText = "PERICOL";
                sv.className = "value st-pericol";
                dv.className = "value st-pericol";
            } 
            else if (dist > 10 && dist <= 100) {
                sv.innerText = "OBSTACOL";
                sv.className = "value st-obstacol";
                dv.className = "value st-obstacol";
            } 
            else {
                sv.innerText = "SIGURANȚĂ";
                sv.className = "value st-siguranta";
                dv.className = "value st-siguranta";
            }
        });

        // 2. MONITORIZARE ULTIMA ORA (SINGURA VALOARE)
        db.ref('ultima_ora').on('value', (snapshot) => {
            const ora = snapshot.val();
            if(ora) {
                document.getElementById('time-val').innerText = ora;
            }
        });
    </script>
</body>
</html>
        });
    </script>
</body>
</html>
