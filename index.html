<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO Dashboard v2</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-blue: #00d2ff;
            --accent-green: #00ff88;
            --accent-red: #ff3e3e;
            --text-dim: #666;
        }

        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color); 
            color: white; 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: radial-gradient(circle at center, #111 0%, #050505 100%);
        }

        /* Ora live - Extrem de discretă */
        #live-clock {
            position: fixed;
            top: 20px;
            right: 30px;
            font-size: 0.75rem;
            color: #333; /* Foarte închis, aproape invizibil pe negru */
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        h1 { 
            font-weight: 200;
            letter-spacing: 8px;
            font-size: 1.2rem;
            color: #aaa;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .main-container {
            position: relative;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid var(--border-color);
            width: 380px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .label { 
            font-size: 0.65rem; 
            color: var(--text-dim); 
            text-transform: uppercase; 
            letter-spacing: 2px;
            margin-bottom: 15px;
        }
        
        /* Valoarea Distanței */
        .dist-container {
            margin-bottom: 30px;
        }

        #dist-val { 
            font-size: 5rem; 
            font-weight: 100;
            font-family: 'Courier New', monospace; /* Aspect tech */
            line-height: 1;
            transition: color 0.5s ease;
        }

        .unit { font-size: 1.5rem; color: #444; margin-left: 5px; }

        /* Status Pill */
        #status-msg { 
            display: inline-block;
            font-size: 0.8rem; 
            font-weight: 600; 
            padding: 8px 20px;
            border-radius: 50px;
            background: rgba(255,255,255,0.05);
            letter-spacing: 1px;
            transition: all 0.5s ease;
        }

        /* Culori Dinamice */
        .color-safe { color: var(--accent-green); border: 1px solid rgba(0,255,136,0.2); box-shadow: 0 0 15px rgba(0,255,136,0.05); }
        .color-danger { color: var(--accent-red); border: 1px solid rgba(255,62,62,0.2); box-shadow: 0 0 20px rgba(255,62,62,0.1); }
        .color-neutral { color: var(--accent-blue); border: 1px solid rgba(0,210,255,0.2); }

        /* Secțiunea Buton */
        .footer {
            margin-top: 40px;
            padding-top: 25px;
            border-top: 1px solid var(--border-color);
        }

        #last-time {
            font-family: monospace;
            font-size: 1.2rem;
            color: #fff;
            opacity: 0.9;
        }

        .pulse {
            animation: pulse-animation 1s ease-out;
        }

        @keyframes pulse-animation {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.7; color: var(--accent-red); }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="live-clock">00:00:00</div>

    <h1>Echo Console</h1>

    <div class="main-container">
        <div class="dist-container">
            <div class="label">Radar Distance</div>
            <div id="dist-val" class="color-neutral">--</div>
            <span class="unit">CM</span>
        </div>
        
        <div id="status-msg" class="color-neutral">WAITING FOR DATA</div>

        <div class="footer">
            <div class="label">Last Button Interaction</div>
            <div id="last-time">--:--:--</div>
        </div>
    </div>

    <script>
        // CONFIGURARE FIREBASE
        const firebaseConfig = {
            databaseURL: "https://echo-bd4aa-default-rtdb.europe-west1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. Ora Live (Discretă)
        function updateClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('ro-RO', { hour12: false });
            document.getElementById('live-clock').innerText = timeString;
        }
        setInterval(updateClock, 1000);
        updateClock();

        const distEl = document.getElementById('dist-val');
        const statusEl = document.getElementById('status-msg');
        const timeEl = document.getElementById('last-time');

        let isFirstLoad = true;

        // 2. Ascultare Distanță
        db.ref('sistem').on('value', (snap) => {
            const data = snap.val();
            if (data) {
                const d = data.distanta;
                distEl.innerText = d;

                if (d <= 10) {
                    distEl.style.color = "var(--accent-red)";
                    statusEl.innerText = "CRITICAL PROXIMITY";
                    statusEl.className = "color-danger";
                } else {
                    distEl.style.color = "var(--accent-green)";
                    statusEl.innerText = "SYSTEM SECURE";
                    statusEl.className = "color-safe";
                }
            }
        });

        // 3. Ascultare Buton (Anti-Refresh inclus)
        db.ref('trigger_buton').on('value', (snap) => {
            if (isFirstLoad) {
                isFirstLoad = false;
                return;
            }

            if (snap.val()) {
                const now = new Date();
                timeEl.innerText = now.toLocaleTimeString('ro-RO', { hour12: false });
                
                // Efect vizual
                timeEl.classList.remove('pulse');
                void timeEl.offsetWidth; // Reset animație
                timeEl.classList.add('pulse');
            }
        });
    </script>
</body>
</html>
