<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO Dashboard v2</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-blue: #00d2ff;
            --accent-green: #00ff88;
            --accent-red: #ff3e3e;
            --text-dim: #666;
        }

        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color); 
            color: white; 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: radial-gradient(circle at center, #111 0%, #050505 100%);
        }

        /* Ora live - Extrem de discretă */
        #live-clock {
            position: fixed;
            top: 20px;
            right: 30px;
            font-size: 0.75rem;
            color: #333; /* Foarte închis, aproape invizibil pe negru */
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        h1 { 
            font-weight: 200;
            letter-spacing: 8px;
            font-size: 1.2rem;
            color: #aaa;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .main-container {
            position: relative;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid var(--border-color);
            width: 380px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .label { 
            font-size: 0.65rem; 
            color: var(--text-dim); 
            text-transform: uppercase; 
            letter-spacing: 2px;
            margin-bottom: 15px;
        }
        
        /* Valoarea Distanței */
        .dist-container {
            margin-bottom: 30px;
        }
