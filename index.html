<!DOCTYPE html>

<html lang="ro">

<head>

    <meta charset="UTF-8">

    <title>ECHO RT - Command Center</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>

        :root {

            --bg: #020617; --card: #0f172a; --cyan: #00f2ff;

            --green: #22c55e; --orange: #f59e0b; --red: #ef4444;

            --text: #f8fafc;

        }

        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }

        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; max-width: 900px; margin-top: 20px; }

        .card { background: var(--card); border: 1px solid #1e293b; padding: 25px; border-radius: 16px; text-align: center; }

        .journal-card { grid-column: 1; text-align: left; min-height: 450px; }

        .value { font-size: 3.2rem; font-weight: 800; display: block; }

        

        /* Culori Status */

        .st-siguranta { color: var(--green); }

        .st-obstacol { color: var(--orange); }

        .st-pericol { color: var(--red); animation: pulse 1s infinite; }



        .log-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); font-family: 'Courier New', monospace; font-size: 1.1rem; }

        .badge { background: rgba(0, 242, 255, 0.1); color: var(--cyan); padding: 2px 6px; border-radius: 4px; margin-right: 10px; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

    </style>

</head>

<body>



    <h1 style="color: var(--cyan); letter-spacing: 4px; text-transform: uppercase;">ECHO <span style="color:white">RT MONITOR</span></h1>



    <div class="dashboard">

        <div class="card journal-card">

            <span style="color: #64748b; text-transform: uppercase; font-size: 0.8rem;">Jurnal Detecție Buton</span>

            <div id="journal" style="margin-top: 15px;"></div>

        </div>



        <div style="display: flex; flex-direction: column; gap: 20px;">

            <div class="card">

                <span style="color: #64748b; font-size: 0.8rem;">DISTANȚĂ</span>

                <span id="dist-val" class="value">-- cm</span>

            </div>

            <div class="card">

                <span style="color: #64748b; font-size: 0.8rem;">STARE SISTEM</span>

                <span id="status-val" class="value" style="font-size: 2.2rem;">---</span>

            </div>

        </div>

    </div>



    <script>

        const firebaseConfig = { databaseURL: "https://echo-bd4aa-default-rtdb.europe-west1.firebasedatabase.app/" };

        firebase.initializeApp(firebaseConfig);

        const db = firebase.database();



        // 1. LOGICA STATUS (CONFORM NOILOR REGULI)

        db.ref('sistem').on('value', (snapshot) => {

            const data = snapshot.val();

            if(!data) return;



            const dist = data.distanta;

            const dv = document.getElementById('dist-val');

            const sv = document.getElementById('status-val');

            

            dv.innerText = dist + " cm";



            if (dist <= 10 && dist > 0) {

                sv.innerText = "PERICOL";

                sv.className = "value st-pericol";

                dv.className = "value st-pericol";

            } 

            else if (dist > 10 && dist <= 100) {

                sv.innerText = "OBSTACOL";

                sv.className = "value st-obstacol";

                dv.className = "value st-obstacol";

            } 

            else {

                sv.innerText = "SIGURANȚĂ";

                sv.className = "value st-siguranta";

                dv.className = "value st-siguranta";

            }

        });



        // 2. LOGICA JURNAL (AFIȘEAZĂ ORA REALĂ A COMPUTERULUI)

        const journalDiv = document.getElementById('journal');



        // Ascultăm doar intrările noi pentru a pune ora exactă a recepției

        db.ref('jurnal').limitToLast(10).on('child_added', (snapshot) => {

            const now = new Date();

            const oraLocala = now.getHours().toString().padStart(2, '0') + ":" + 

                             now.getMinutes().toString().padStart(2, '0') + ":" + 

                             now.getSeconds().toString().padStart(2, '0');



            const logItem = document.createElement('div');

            logItem.className = 'log-item';

            logItem.innerHTML = `

                <span><span class="badge">BUTON</span> APĂSAT</span>

                <span style="color: var(--cyan)">${oraLocala}</span>

            `;

            

            // Adăugăm noua intrare la începutul listei

            journalDiv.insertBefore(logItem, journalDiv.firstChild);

        });

    </script>

</body>

</html>
